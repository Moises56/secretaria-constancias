name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: constancias
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: constancias_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://constancias:testpass@localhost:5432/constancias_test
      AUTH_SECRET: ci-secret-not-for-production-min-32-chars-ok
      VERIFICATION_HMAC_SECRET: ci-hmac-secret-not-for-production-min-32-chars
      AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      NODE_ENV: test
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_EMAIL: admin@ci.test
      SEED_ADMIN_PASSWORD: CIAdminTest!2026

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run migrations
        run: pnpm prisma migrate deploy

      - name: Seed test data
        run: pnpm db:seed

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests with coverage
        run: pnpm test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: E2E tests
        run: pnpm test:e2e --project=chromium

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: |
            playwright-report/
            test-results/
          retention-days: 7
